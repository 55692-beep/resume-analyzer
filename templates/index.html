<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center text-primary">AI Resume Analyzer</h2>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Upload Resume</label>
                <input type="file" name="resume" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Job Description</label>
                <textarea name="job_description" class="form-control" rows="6" required></textarea>
            </div>

            <button class="btn btn-primary w-100">Analyze</button>
        </form>

        {% if score %}
        <hr>
        <h4>Match Score: {{ score }}%</h4>

        <h5 class="mt-3">Extracted Skills:</h5>
        <p>{{ skills }}</p>

        <h5>Missing Skills:</h5>
        <p class="text-danger">{{ missing_skills }}</p>
        {% endif %}

    </div>

</div>
